<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <title>Invoice PDF Generator</title>
    <script src="https://unpkg.com/pdf-lib/dist/pdf-lib.js"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f9f9f9;
        }
        .wrapper {
            max-width: 900px;
            margin: 2rem auto;
            padding: 2rem;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            border-radius: 8px;
        }
        button {
            padding: 1rem 2rem;
            font-size: 1.1rem;
            cursor: pointer;
            border: none;
            border-radius: 5px;
        }
        .pdf-btn {
            margin: 2rem 0;
            display: flex;
            gap: 1rem;
            flex-wrap: wrap;
        }
        .pdf-btn button {
            flex: 1;
            min-width: 200px;
        }
        .green-btn {
            background-color: #4CAF50;
            color: white;
        }
        .green-btn:hover {
            background-color: #45a049;
        }

        .date-selector {
            margin: 1.5rem 0;
            padding: 1.5rem;
            border: 1px solid #ddd;
            border-radius: 8px;
            background: #fafafa;
        }
        .month-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-top: 1rem;
        }
        .month-btn {
            padding: 0.6rem 1.2rem;
            background-color: #f0f0f0;
            border: 1px solid #ccc;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .month-btn:hover {
            background-color: #e0e0e0;
        }
        .month-btn.active {
            background-color: #4CAF50;
            color: white;
            border-color: #4CAF50;
        }
        .current-date-display {
            margin-top: 1rem;
            font-weight: bold;
            font-size: 1.25rem;
            color: #333;
        }

        .pdf-wrapper {
            margin-top: 2rem;
            position: relative;
            padding-bottom: 56.25%; /* 16:9 */
            height: 0;
            overflow: hidden;
            border: 1px solid #ddd;
            border-radius: 8px;
        }
        .pdf-wrapper iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        label {
            font-weight: bold;
            margin-top: 1rem;
            display: block;
        }
        input {
            width: 100%;
            padding: 0.7rem;
            margin-top: 0.4rem;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 1rem;
        }
        .task-section {
            margin-top: 1.5rem;
            padding: 1rem;
            border: 1px solid #eee;
            border-radius: 6px;
            background: #fdfdfd;
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <h2>Invoice PDF Generator</h2>
        <p style="color:#666;">Version: v0.9 (Improved Date Selector + Fixed Generate Logic)</p>

        <!-- Date Selector -->
        <div class="date-selector">
            <h3>Select Invoice Month:</h3>
            <div class="month-buttons" id="monthButtons"></div>
            <div class="current-date-display" id="currentDateDisplay">
                Current Date: October 12, 2025
            </div>
        </div>

        <form id="invoiceForm">
            <label for="company-name">Company Name:</label>
            <input type="text" id="company-name" placeholder="Enter company name..." maxlength="48" required>

            <label for="task-number">Number of Tasks (max 8):</label>
            <input type="number" id="task-number" min="1" max="8" placeholder="How many tasks?" required>

            <div id="taskSections"></div>
        </form>

        <div class="pdf-btn">
            <button onclick="modifyPdf()">Modify PDF (Current Month Only)</button>
            <button onclick="generateAllMonths()" class="green-btn">
                Generate & Download All 12 Months
            </button>
        </div>

        <div class="pdf-wrapper">
            <iframe id="pdf"></iframe>
        </div>
    </div>

    <script>
        const { PDFDocument, rgb, StandardFonts } = PDFLib;
        const TASK_LIMIT = 8;

        // Current selected date (starts from October 2025)
        let currentDate = new Date(2025, 9, 12); // October 12, 2025

        const monthNames = [
            "October 2025", "November 2025", "December 2025",
            "January 2026", "February 2026", "March 2026",
            "April 2026", "May 2026", "June 2026",
            "July 2026", "August 2026", "September 2026"
        ];

        // Initialize everything
        document.addEventListener('DOMContentLoaded', () => {
            generateMonthButtons();
            updateDateDisplay();
        });

        function generateMonthButtons() {
            const container = document.getElementById('monthButtons');
            container.innerHTML = '';

            for (let i = 0; i < 12; i++) {
                const btn = document.createElement('button');
                btn.className = `month-btn ${i === 0 ? 'active' : ''}`;
                btn.textContent = monthNames[i];
                btn.dataset.index = i;

                btn.addEventListener('click', () => {
                    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');

                    currentDate = new Date(2025, 9 + i, 12); // 12th of each month
                    updateDateDisplay();
                });

                container.appendChild(btn);
            }
        }

        function updateDateDisplay() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formatted = currentDate.toLocaleDateString('en-US', options);
            document.getElementById('currentDateDisplay').textContent = `Current Date: ${formatted}`;
        }

        // Dynamic task sections
        document.getElementById("task-number").addEventListener("input", function () {
            const taskNumber = parseInt(this.value) || 0;
            const container = document.getElementById('taskSections');
            container.innerHTML = '';

            if (taskNumber > TASK_LIMIT) {
                container.innerHTML = `<p style="color:red;">Maximum ${TASK_LIMIT} tasks allowed.</p>`;
                return;
            }

            for (let i = 0; i < taskNumber; i++) {
                const section = document.createElement('div');
                section.className = 'task-section';
                section.innerHTML = `
                    <h3>Task ${String.fromCharCode(65 + i)}</h3>
                    <label>Task Name:</label>
                    <input type="text" id="task-name-${i}" maxlength="39">

                    <label>Quantity:</label>
                    <input type="number" id="qty-${i}" min="1">

                    <label>Price per task:</label>
                    <input type="number" id="price-${i}" min="0" step="0.01">
                `;
                container.appendChild(section);
            }
        });

        function getFormData() {
            const taskNumber = parseInt(document.getElementById('task-number').value) || 0;
            const data = [];

            for (let i = 0; i < taskNumber; i++) {
                const taskName = document.getElementById(`task-name-${i}`).value.trim();
                const qty = parseFloat(document.getElementById(`qty-${i}`).value) || 0;
                const price = parseFloat(document.getElementById(`price-${i}`).value) || 0;

                data.push({
                    taskName: taskName || `Task ${String.fromCharCode(65 + i)}`,
                    qty: qty,
                    price: price,
                    total: qty * price
                });
            }
            return data;
        }

        // Generate PDF for currently selected date only
        async function modifyPdf() {
            const options = { year: 'numeric', month: 'long', day: 'numeric' };
            const formattedDate = currentDate.toLocaleDateString("en-US", options);

            await generateSinglePdf(currentDate, formattedDate);
        }

        // Generate and download all 12 months
        async function generateAllMonths() {
            if (!confirm("This will generate and download 12 PDF files. Continue?")) return;

            const companyName = document.getElementById('company-name').value.trim() || "invoice";

            for (let i = 0; i < 12; i++) {
                const loopDate = new Date(2025, 9 + i, 12);
                const formattedDate = loopDate.toLocaleDateString("en-US", { 
                    year: 'numeric', month: 'long', day: 'numeric' 
                });

                await generateSinglePdf(loopDate, formattedDate);

                // Small delay for browser stability
                await new Promise(r => setTimeout(r, 150));

                const monthName = monthNames[i].replace(/\s+/g, '_');
                await downloadCurrentPdf(monthName);
            }

            alert('All 12 months PDFs have been downloaded!');
        }

        // Core PDF generation
        async function generateSinglePdf(targetDate, formattedDate) {
            const companyName = document.getElementById('company-name').value.trim();
            const formData = getFormData();
            const totalAmount = formData.reduce((sum, item) => sum + item.total, 0);

            try {
                const url = 'https://jaredycw.github.io/pdf/template.pdf';
                const existingPdfBytes = await fetch(url).then(res => res.arrayBuffer());
                const pdfDoc = await PDFDocument.load(existingPdfBytes);

                const helveticaFont = await pdfDoc.embedFont(StandardFonts.Helvetica);
                const firstPage = pdfDoc.getPages()[0];
                const { width, height } = firstPage.getSize();

                const rowHeight = height / 2 + 50;

                // Company Name
                firstPage.drawText(companyName, {
                    x: 201,
                    y: height / 2 + 262,
                    size: 13,
                    font: helveticaFont,
                    color: rgb(29/255, 29/255, 31/255),
                });

                // Tasks
                for (let i = 0; i < formData.length; i++) {
                    const item = formData[i];
                    const yPos = rowHeight - (i * 25);

                    firstPage.drawText(item.taskName, { x: 69, y: yPos, size: 13, font: helveticaFont, color: rgb(29/255, 29/255, 31/255) });
                    firstPage.drawText(item.qty.toString(), { x: 383, y: yPos, size: 13, font: helveticaFont, color: rgb(29/255, 29/255, 31/255) });
                    firstPage.drawText("$" + Number(item.price).toLocaleString('en-US'), { 
                        x: 467, y: yPos, size: 13, font: helveticaFont, color: rgb(29/255, 29/255, 31/255) 
                    });
                }

                // Total
                firstPage.drawText("$" + Number(totalAmount).toLocaleString('en-US'), {
                    x: 467,
                    y: height / 2 - 178,
                    size: 13,
                    font: helveticaFont,
                    color: rgb(29/255, 29/255, 31/255),
                });

                // Date
                const textWidth = helveticaFont.widthOfTextAtSize(formattedDate, 13);
                firstPage.drawText("Date: " + formattedDate, {
                    x: width - 100 - textWidth,
                    y: height / 2 - 300,
                    size: 13,
                    font: helveticaFont,
                    color: rgb(29/255, 29/255, 31/255),
                });

                const pdfBytes = await pdfDoc.save();

                // Save for download
                window.lastGeneratedPdfBytes = pdfBytes;
                window.lastGeneratedPdfDate = formattedDate;

                // Preview in iframe
                const pdfBlob = new Blob([pdfBytes], { type: 'application/pdf' });
                document.getElementById('pdf').src = URL.createObjectURL(pdfBlob);

            } catch (error) {
                console.error('Error generating PDF:', error);
                alert('Failed to generate PDF. Check console for details.');
            }
        }

        // Download the last generated PDF
        async function downloadCurrentPdf(filenameSuffix = '') {
            if (!window.lastGeneratedPdfBytes) {
                alert("Please generate a PDF first");
                return;
            }

            const blob = new Blob([window.lastGeneratedPdfBytes], { type: 'application/pdf' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');

            const companyName = document.getElementById('company-name').value.trim() || "invoice";
            const safeName = companyName.replace(/[^a-z0-9]/gi, '_').toLowerCase();
            const dateStr = window.lastGeneratedPdfDate ? 
                window.lastGeneratedPdfDate.replace(/[^a-z0-9]/gi, '_').toLowerCase() : 'invoice';

            const filename = `${safeName}${filenameSuffix ? '_' + filenameSuffix : ''}_${dateStr}.pdf`;

            a.href = url;
            a.download = filename;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }
    </script>
</body>
</html>
